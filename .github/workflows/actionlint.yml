name: actionlint

# Syntactic + semantic linter for GitHub Actions workflows. Catches
# expression errors, shell-quoting bugs, and unsafe usage that pure
# YAML parsing misses (e.g. ``${{ github.event.pull_request.title }}``
# injected into a shell). Runs only when workflow files change so it
# does not contribute to everyday-commit latency.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download actionlint
        id: actionlint
        run: |
          # Canonical install script, recommended by upstream README.
          # The resolved binary path is exposed as a step output so the
          # next step does not depend on PATH layout.
          bash <(curl --fail --silent --show-error --retry 3 \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ${{ steps.actionlint.outputs.executable }} -color
        shell: bash
