name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with γ-witness extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,witness]"

      - name: Ruff check (neurophase + tests)
        run: ruff check neurophase tests

      - name: Ruff check (tools)
        run: ruff check tools

      - name: Ruff format check (neurophase + tests + tools)
        run: ruff format --check neurophase tests tools

      - name: Mypy strict (neurophase)
        run: mypy --strict neurophase

      - name: Mypy strict (tools)
        run: mypy --strict tools

      - name: Pytest (default suite — excludes hardware + acceptance)
        run: pytest -q --cov=neurophase --cov-report=term-missing

      - name: Pytest (acceptance suite — fresh-clone chain)
        run: pytest -q -m acceptance --no-cov

      - name: Doctor (axis 7 + 8 + 9 composition-level gate)
        run: python -m neurophase doctor
