name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ``neosynaptex`` ships bundled evidence files that are not yet
      # packaged into its wheel, so a plain ``pip install git+…`` import
      # fails at module load. Clone the repo into a sibling directory and
      # editable-install it so those on-disk evidence files stay reachable
      # for the γ-witness test suite.
      - name: Install package (with γ-witness extras)
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 https://github.com/neuron7xLab/neosynaptex.git "${RUNNER_TEMP}/neosynaptex"
          pip install -e "${RUNNER_TEMP}/neosynaptex"
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check neurophase tests

      - name: Ruff format check
        run: ruff format --check neurophase tests

      - name: Mypy strict
        run: mypy neurophase

      - name: Pytest
        run: pytest -q --cov=neurophase --cov-report=term-missing

      - name: Doctor (axis 7 + 8 + 9 composition-level gate)
        run: python -m neurophase doctor
