<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" role="img" aria-labelledby="title desc">
  <title id="title">neurophase — brain · physics · market causality</title>
  <desc id="desc">Animated causality chain: neural oscillators firing in a brain, Kuramoto phase synchronization, market chart reacting in green/red based on the order parameter R(t).</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="brainHalo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="physHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============== BACKGROUND ============== -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="95" x2="1200" y2="95"/>
    <line x1="0" y1="285" x2="1200" y2="285"/>
    <line x1="400" y1="30" x2="400" y2="310"/>
    <line x1="790" y1="30" x2="790" y2="310"/>
  </g>

  <!-- zone headers -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#64748b" letter-spacing="3">
    <text x="200" y="50" text-anchor="middle">01 · BRAIN</text>
    <text x="595" y="50" text-anchor="middle">02 · PHYSICS</text>
    <text x="970" y="50" text-anchor="middle">03 · MARKET</text>
  </g>

  <!-- ============================================================= -->
  <!-- ZONE 1 — BRAIN (neural network firing)                        -->
  <!-- ============================================================= -->
  <g transform="translate(200, 180)">
    <ellipse cx="0" cy="0" rx="150" ry="105" fill="url(#brainHalo)"/>

    <!-- synaptic edges -->
    <g stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.35" fill="none">
      <path d="M -95 -25 L -55 -60 L -10 -75 L 40 -65 L 88 -30 L 98 20 L 62 65 L 12 78 L -48 62 L -95 30 Z"/>
      <line x1="-55" y1="-60" x2="-30" y2="-10"/>
      <line x1="-30" y1="-10" x2="22" y2="-32"/>
      <line x1="22" y1="-32" x2="42" y2="18"/>
      <line x1="42" y1="18" x2="-10" y2="32"/>
      <line x1="-10" y1="32" x2="-30" y2="-10"/>
      <line x1="-30" y1="-10" x2="-62" y2="15"/>
      <line x1="-62" y1="15" x2="-48" y2="62"/>
      <line x1="22" y1="-32" x2="62" y2="5"/>
      <line x1="62" y1="5" x2="42" y2="18"/>
      <line x1="62" y1="5" x2="12" y2="78"/>
      <line x1="-95" y1="-25" x2="-62" y2="15"/>
      <line x1="88" y1="-30" x2="62" y2="5"/>
      <line x1="98" y1="20" x2="42" y2="18"/>
    </g>

    <!-- neurons (perimeter) -->
    <g fill="#A78BFA" filter="url(#glow)">
      <circle cx="-95" cy="-25" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-55" cy="-60" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.16s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.16s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-10" cy="-75" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.32s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.32s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="-65" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.48s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.48s" repeatCount="indefinite"/>
      </circle>
      <circle cx="88" cy="-30" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.64s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.64s" repeatCount="indefinite"/>
      </circle>
      <circle cx="98" cy="20" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.80s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.80s" repeatCount="indefinite"/>
      </circle>
      <circle cx="62" cy="65" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="0.96s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="0.96s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="78" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="1.12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="1.12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-48" cy="62" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="1.28s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="1.28s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-95" cy="30" r="3.5">
        <animate attributeName="r" values="2.5;5.5;2.5" dur="1.6s" begin="1.44s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" begin="1.44s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- inner neurons (smaller, faster) -->
    <g fill="#C4B5FD" filter="url(#softGlow)">
      <circle cx="-30" cy="-10" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="0.20s" repeatCount="indefinite"/>
      </circle>
      <circle cx="22" cy="-32" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="0.50s" repeatCount="indefinite"/>
      </circle>
      <circle cx="42" cy="18" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="0.80s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-10" cy="32" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="1.10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-62" cy="15" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="0.35s" repeatCount="indefinite"/>
      </circle>
      <circle cx="62" cy="5" r="2.8">
        <animate attributeName="r" values="1.8;4;1.8" dur="1.3s" begin="0.65s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- traveling signals along perimeter -->
    <circle r="4" fill="#22D3EE" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite"
        path="M -95 -25 L -55 -60 L -10 -75 L 40 -65 L 88 -30 L 98 20 L 62 65 L 12 78 L -48 62 L -95 30 Z"/>
    </circle>
    <circle r="3" fill="#67E8F9" filter="url(#glow)" opacity="0.85">
      <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite"
        path="M -95 -25 L -55 -60 L -10 -75 L 40 -65 L 88 -30 L 98 20 L 62 65 L 12 78 L -48 62 L -95 30 Z"/>
    </circle>
    <circle r="2.5" fill="#a5f3fc" filter="url(#softGlow)" opacity="0.7">
      <animateMotion dur="4s" begin="2.6s" repeatCount="indefinite"
        path="M -95 -25 L -55 -60 L -10 -75 L 40 -65 L 88 -30 L 98 20 L 62 65 L 12 78 L -48 62 L -95 30 Z"/>
    </circle>

    <!-- emitted signal → physics (causality outflow) -->
    <circle r="3" fill="#8B5CF6" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite"/>
      <animateMotion dur="4s" repeatCount="indefinite"
        path="M 98 0 L 260 0"/>
    </circle>
    <circle r="3" fill="#8B5CF6" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite"
        path="M 98 0 L 260 0"/>
    </circle>
  </g>

  <text x="200" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8" letter-spacing="1.2">
    EEG · HRV · pupil  →  φ_neural
  </text>

  <!-- ============================================================= -->
  <!-- ZONE 2 — PHYSICS (Kuramoto phase synchronization)             -->
  <!-- ============================================================= -->
  <g transform="translate(595, 180)">
    <circle cx="0" cy="0" r="95" fill="url(#physHalo)"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2 4"/>
    <circle cx="0" cy="0" r="2" fill="#64748b"/>

    <!-- 6 Kuramoto phase vectors -->
    <!-- each oscillator spins then synchronizes then diverges — 8s cycle -->
    <g stroke-width="2.2" stroke-linecap="round" filter="url(#softGlow)">
      <line x1="0" y1="0" x2="72" y2="0" stroke="#8B5CF6">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="0; 90; 150; 155; 150; 90; 0; -90; -150; -155; -150; -90; 0"/>
      </line>
      <line x1="0" y1="0" x2="72" y2="0" stroke="#A78BFA">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="60; 120; 148; 155; 148; 120; 60; -30; -120; -148; -155; -148; 60"/>
      </line>
      <line x1="0" y1="0" x2="72" y2="0" stroke="#C4B5FD">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="120; 135; 152; 155; 152; 135; 120; 30; -60; -152; -155; -152; 120"/>
      </line>
      <line x1="0" y1="0" x2="72" y2="0" stroke="#22D3EE">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="180; 160; 156; 155; 156; 160; 180; 240; 300; 205; 205; 205; 180"/>
      </line>
      <line x1="0" y1="0" x2="72" y2="0" stroke="#67E8F9">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="240; 200; 158; 155; 158; 200; 240; 300; 30; 210; 205; 208; 240"/>
      </line>
      <line x1="0" y1="0" x2="72" y2="0" stroke="#a5f3fc">
        <animateTransform attributeName="transform" type="rotate" dur="8s" repeatCount="indefinite"
          values="300; 250; 160; 155; 160; 250; 300; 0; 90; 215; 205; 210; 300"/>
      </line>
    </g>

    <!-- resultant ring (pulses when synced) -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#10B981" stroke-width="2">
      <animate attributeName="opacity" values="0;0;0.9;0.9;0;0;0.9;0.9;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="88;88;96;96;88;88;96;96;88" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#EF4444" stroke-width="1.5">
      <animate attributeName="opacity" values="0.7;0.7;0;0;0.7;0.7;0;0;0.7" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- R(t) meter -->
  <g transform="translate(500, 295)">
    <text x="-5" y="3" font-family="JetBrains Mono, monospace" font-size="9" fill="#94a3b8" text-anchor="end">R(t)</text>
    <rect x="0" y="-6" width="190" height="10" fill="none" stroke="#334155" stroke-width="0.6"/>
    <rect x="0" y="-6" height="10">
      <animate attributeName="width" values="35;35;168;168;35;35;168;168;35" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#EF4444;#EF4444;#10B981;#10B981;#EF4444;#EF4444;#10B981;#10B981;#EF4444" dur="8s" repeatCount="indefinite"/>
    </rect>
    <line x1="123" y1="-10" x2="123" y2="8" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="123" y="18" text-anchor="middle" font-family="monospace" font-size="8" fill="#F59E0B">θ=0.65</text>
  </g>

  <text x="595" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8" letter-spacing="1.2">
    R·e^iΨ = (1/N) Σ e^iθₖ
  </text>

  <!-- =============================================================  -->
  <!-- ZONE 3 — MARKET (price reacts to R(t) sync state)              -->
  <!-- =============================================================  -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="340" height="195" fill="none" stroke="#334155" stroke-width="0.6"/>
    <g stroke="#1e293b" stroke-width="0.4" stroke-dasharray="2 3">
      <line x1="0" y1="49" x2="340" y2="49"/>
      <line x1="0" y1="98" x2="340" y2="98"/>
      <line x1="0" y1="146" x2="340" y2="146"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="7" fill="#475569">
      <text x="-4" y="11" text-anchor="end">+2σ</text>
      <text x="-4" y="52" text-anchor="end">+σ</text>
      <text x="-4" y="101" text-anchor="end">μ</text>
      <text x="-4" y="149" text-anchor="end">−σ</text>
      <text x="-4" y="190" text-anchor="end">−2σ</text>
    </g>

    <!-- base price zigzag (dim baseline) -->
    <polyline
      points="0,118 21,128 42,123 63,133 84,126 105,100 126,72 147,55 168,60 189,80 210,95 231,108 252,88 273,60 294,35 315,18 336,22"
      fill="none" stroke="#334155" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- red segment 1 (bearish 0..4) -->
    <polyline points="0,118 21,128 42,123 63,133 84,126"
      fill="none" stroke="#EF4444" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;1;0.15;0.15;1;1;0.15;0.15;1" dur="8s" repeatCount="indefinite"/>
    </polyline>
    <!-- green segment 1 (bullish 4..8 when R≥θ) -->
    <polyline points="84,126 105,100 126,72 147,55 168,60"
      fill="none" stroke="#10B981" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.15;0.15;1;1;0.15;0.15;1;1;0.15" dur="8s" repeatCount="indefinite"/>
    </polyline>
    <!-- red segment 2 (8..12) -->
    <polyline points="168,60 189,80 210,95 231,108 252,88"
      fill="none" stroke="#EF4444" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;1;0.15;0.15;1;1;0.15;0.15;1" dur="8s" repeatCount="indefinite"/>
    </polyline>
    <!-- green segment 2 (12..16) -->
    <polyline points="252,88 273,60 294,35 315,18 336,22"
      fill="none" stroke="#10B981" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.15;0.15;1;1;0.15;0.15;1;1;0.15" dur="8s" repeatCount="indefinite"/>
    </polyline>

    <!-- time cursor sweep -->
    <line x1="0" y1="-5" x2="0" y2="200" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.55">
      <animate attributeName="x1" values="0;336;0;336;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;336;0;336;0" dur="8s" repeatCount="indefinite"/>
    </line>

    <!-- price dot tracing the path -->
    <circle r="4.5" fill="#22D3EE" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite"
        path="M 0,118 L 21,128 L 42,123 L 63,133 L 84,126 L 105,100 L 126,72 L 147,55 L 168,60 L 189,80 L 210,95 L 231,108 L 252,88 L 273,60 L 294,35 L 315,18 L 336,22"/>
    </circle>

    <!-- state chip -->
    <g font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="1">
      <rect x="248" y="6" width="86" height="16" rx="2" fill="none" stroke="#10B981" stroke-width="1">
        <animate attributeName="stroke" values="#EF4444;#EF4444;#10B981;#10B981;#EF4444;#EF4444;#10B981;#10B981;#EF4444" dur="8s" repeatCount="indefinite"/>
      </rect>
      <text x="291" y="17" text-anchor="middle">
        <animate attributeName="fill" values="#EF4444;#EF4444;#10B981;#10B981;#EF4444;#EF4444;#10B981;#10B981;#EF4444" dur="8s" repeatCount="indefinite"/>
        <tspan>
          <animate attributeName="font-weight" values="700" dur="8s" repeatCount="indefinite"/>
        </tspan>
        BLOCKED<set attributeName="visibility" to="visible"/>
      </text>
      <!-- two overlapping labels, alpha-swapped -->
      <text x="291" y="17" text-anchor="middle" fill="#EF4444" font-weight="700">
        <animate attributeName="opacity" values="1;1;0;0;1;1;0;0;1" dur="8s" repeatCount="indefinite"/>
        BLOCKED
      </text>
      <text x="291" y="17" text-anchor="middle" fill="#10B981" font-weight="700">
        <animate attributeName="opacity" values="0;0;1;1;0;0;1;1;0" dur="8s" repeatCount="indefinite"/>
        READY
      </text>
    </g>
  </g>

  <text x="970" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8" letter-spacing="1.2">
    execution_allowed ⇔ R(t) ≥ θ
  </text>

  <!-- =============================================================  -->
  <!-- CAUSALITY BAR — neuroscience · physics · first cause of value  -->
  <!-- =============================================================  -->
  <g transform="translate(0, 345)">
    <line x1="200" y1="0" x2="970" y2="0" stroke="#334155" stroke-width="1" stroke-dasharray="2 4"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#94a3b8" letter-spacing="1">
      <circle cx="200" cy="0" r="4" fill="#A78BFA" filter="url(#softGlow)"/>
      <text x="200" y="20" text-anchor="middle">neuroscience</text>

      <circle cx="595" cy="0" r="4" fill="#8B5CF6" filter="url(#softGlow)"/>
      <text x="595" y="20" text-anchor="middle">physics</text>

      <circle cx="970" cy="0" r="4" fill="#10B981" filter="url(#softGlow)"/>
      <text x="970" y="20" text-anchor="middle">market · value</text>
    </g>

    <!-- flow particles — brain → physics → market -->
    <circle r="3.5" fill="#22D3EE" filter="url(#glow)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M 200 0 L 970 0"/>
    </circle>
    <circle r="3.5" fill="#22D3EE" filter="url(#glow)" opacity="0.7">
      <animateMotion dur="5s" begin="1.25s" repeatCount="indefinite" path="M 200 0 L 970 0"/>
    </circle>
    <circle r="3.5" fill="#22D3EE" filter="url(#glow)" opacity="0.45">
      <animateMotion dur="5s" begin="2.5s" repeatCount="indefinite" path="M 200 0 L 970 0"/>
    </circle>
    <circle r="3.5" fill="#22D3EE" filter="url(#glow)" opacity="0.3">
      <animateMotion dur="5s" begin="3.75s" repeatCount="indefinite" path="M 200 0 L 970 0"/>
    </circle>
  </g>

  <text x="600" y="388" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#475569" letter-spacing="2.5">
    NEUROSCIENCE · PHYSICS · FIRST  CAUSE  OF  VALUE
  </text>
</svg>
