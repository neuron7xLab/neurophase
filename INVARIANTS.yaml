# neurophase — machine-readable invariant registry
#
# Load-bearing. Governed by docs/EVOLUTION_BOARD.md and docs/TASK_MAP.md.
# Every registered invariant MUST bind to ≥ 1 passing pytest node id.
# A CI meta-test (tests/test_invariants_registry.py) fails if any binding
# is broken, any test is missing, or any invariant has zero bound tests.
#
# Schema:
#   version:       registry schema version (integer; bump on breaking changes)
#   invariants:    list of Invariant records
#     id:             short stable identifier  (string, unique)
#     symbol:         display symbol            (e.g. "I₁")
#     statement:      mathematical / prose statement (one line)
#     severity:       "hard" | "advisory"
#     enforced_in:    list of (path, symbol) where enforcement lives
#     tests:          list of pytest node ids that verify the invariant
#     docs:           list of doc paths with the formal specification
#     introduced_in:  PR number where the invariant was first enforced
#
# This file is hand-maintained. The loader in
# neurophase/governance/invariants.py validates the schema at load time
# and the CI meta-test validates the bindings.

version: 1

invariants:
  - id: I1
    symbol: "I₁"
    statement: "R(t) < threshold ⇒ execution_allowed = False"
    severity: hard
    enforced_in:
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
      - path: neurophase/gate/execution_gate.py
        symbol: GateDecision.__post_init__
    tests:
      - tests/test_execution_gate.py::test_blocks_below_threshold
      - tests/test_execution_gate.py::test_invariant_cannot_be_bypassed
      - tests/test_execution_gate.py::test_five_gate_states_exhaustive
    docs:
      - docs/theory/scientific_basis.md
      - docs/theory/stillness_invariant.md
    introduced_in: "initial"

  - id: I2
    symbol: "I₂"
    statement: "bio-sensor absent ⇒ execution_allowed = False (gate returns SENSOR_ABSENT)"
    severity: hard
    enforced_in:
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
    tests:
      - tests/test_execution_gate.py::test_sensor_absent
    docs:
      - docs/theory/scientific_basis.md
    introduced_in: "initial"

  - id: I3
    symbol: "I₃"
    statement: "R(t) invalid / None / NaN / out-of-range ⇒ execution_allowed = False (gate returns DEGRADED)"
    severity: hard
    enforced_in:
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
    tests:
      - tests/test_execution_gate.py::test_degraded_on_nan
      - tests/test_execution_gate.py::test_degraded_on_none
    docs:
      - docs/theory/scientific_basis.md
    introduced_in: "initial"

  - id: I4
    symbol: "I₄"
    statement: "stillness (max |dR/dt| < ε_R ∧ max |dF_proxy/dt| < ε_F ∧ max δ < δ_min over rolling window) ⇒ execution_allowed = False (gate returns UNNECESSARY)"
    severity: advisory
    enforced_in:
      - path: neurophase/gate/stillness_detector.py
        symbol: StillnessDetector
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
      - path: neurophase/gate/execution_gate.py
        symbol: GateDecision.__post_init__
    tests:
      - tests/test_stillness_detector.py::TestRequiredStillCriterion::test_still_when_all_criteria_met
      - tests/test_stillness_detector.py::TestRequiredActiveOnRChange::test_active_when_R_changing
      - tests/test_stillness_detector.py::TestRequiredActiveOnLargeDelta::test_active_when_delta_too_large
      - tests/test_stillness_detector.py::TestWindowWideVsLastSample::test_window_wide_beats_last_sample
      - tests/test_execution_gate.py::test_returns_unnecessary_when_ready_but_still
      - tests/test_execution_gate.py::test_invariant_holds_for_unnecessary_too[GateState.UNNECESSARY]
    docs:
      - docs/theory/stillness_invariant.md
      - docs/theory/scientific_basis.md
    introduced_in: "PR #9"

  - id: B1
    symbol: "B₁"
    statement: "temporal precondition: input time_quality ≠ VALID ⇒ execution_allowed = False (gate returns DEGRADED with temporal: reason)"
    severity: hard
    enforced_in:
      - path: neurophase/data/temporal_validator.py
        symbol: TemporalValidator
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
    tests:
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_unchanged_when_time_quality_not_supplied
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_ready_with_valid_time_quality
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.GAPPED]
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.STALE]
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.REVERSED]
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.DUPLICATE]
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.WARMUP]
      - tests/test_temporal_validator.py::TestGateIntegration::test_gate_degraded_on_non_valid_time_quality[TimeQuality.INVALID]
      - tests/test_temporal_validator.py::TestGateIntegration::test_temporal_check_overrides_ready
      - tests/test_temporal_validator.py::TestGateIntegration::test_temporal_check_overrides_sensor_absent
      - tests/test_temporal_validator.py::TestGateIntegration::test_end_to_end_pipeline_with_validator
    docs:
      - docs/theory/time_integrity.md
    introduced_in: "PR #11"

# Honest-naming contracts — these are not permission invariants but
# they are load-bearing and must be enforced by tests so that future
# refactors cannot weaken them silently.
honest_naming:
  - id: HN1
    statement: "F_proxy = ½·δ² is a geometric surrogate, never called full free energy in the public API"
    enforced_in:
      - path: neurophase/gate/stillness_detector.py
        symbol: free_energy_proxy
    tests:
      - tests/test_stillness_detector.py::TestFreeEnergyProxy::test_free_energy_proxy_matches_formula
    docs:
      - docs/theory/stillness_invariant.md

  - id: HN2
    statement: "TemporalValidator never repairs time — it only reports. No interpolation, no resampling, no drift estimation."
    enforced_in:
      - path: neurophase/data/temporal_validator.py
        symbol: TemporalValidator
    tests:
      - tests/test_temporal_validator.py::TestDeterminism::test_same_input_same_decision_sequence
    docs:
      - docs/theory/time_integrity.md

  - id: HN3
    statement: "NullModelHarness p-values use Phipson–Smyth (1+k)/(1+n) smoothing — p_value is never zero for finite n."
    enforced_in:
      - path: neurophase/validation/null_model.py
        symbol: NullModelHarness.test
    tests:
      - tests/test_null_model_harness.py::TestPValueMath::test_p_value_is_phipson_smyth_smoothed
    docs:
      - docs/theory/scientific_basis.md

  - id: HN4
    statement: "Surrogate generators are seeded via np.random.Generator only — same seed produces identical null distributions to the bit."
    enforced_in:
      - path: neurophase/validation/null_model.py
        symbol: NullModelHarness
      - path: neurophase/validation/surrogates.py
        symbol: cyclic_shift
    tests:
      - tests/test_null_model_harness.py::TestDeterminism::test_same_seed_same_null_distribution
    docs:
      - docs/theory/scientific_basis.md

  - id: HN5
    statement: "DecisionTraceLedger is append-only and tamper-evident — any post-hoc mutation of any record breaks verify_ledger at the first affected index."
    enforced_in:
      - path: neurophase/audit/decision_ledger.py
        symbol: DecisionTraceLedger
      - path: neurophase/audit/decision_ledger.py
        symbol: verify_ledger
    tests:
      - tests/test_decision_ledger.py::TestTamperDetection::test_mutated_reason_detected
      - tests/test_decision_ledger.py::TestTamperDetection::test_mutated_R_detected
      - tests/test_decision_ledger.py::TestTamperDetection::test_swapped_records_detected
      - tests/test_decision_ledger.py::TestTamperDetection::test_deleted_record_detected
      - tests/test_decision_ledger.py::TestTamperDetection::test_bogus_hash_detected
      - tests/test_decision_ledger.py::TestTamperDetection::test_truncated_line_detected
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN6
    statement: "DecisionTraceLedger output is deterministic: same inputs + same parameter fingerprint → identical hash chain to the bit."
    enforced_in:
      - path: neurophase/audit/decision_ledger.py
        symbol: DecisionTraceLedger
    tests:
      - tests/test_decision_ledger.py::TestDeterminism::test_two_ledgers_produce_identical_hash_chain
      - tests/test_decision_ledger.py::TestDeterminism::test_distinct_parameters_yield_distinct_hashes
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN7
    statement: "PLV significance is computed via NullModelHarness — never via a naive unsmoothed surrogate estimator. p-value is Phipson–Smyth smoothed and strictly positive for any finite n_surrogates."
    enforced_in:
      - path: neurophase/metrics/plv.py
        symbol: plv_significance
    tests:
      - tests/test_plv_held_out.py::TestHarnessDelegation::test_p_value_is_strictly_positive
      - tests/test_plv_held_out.py::TestDeterminism::test_same_seed_same_p_value
    docs:
      - docs/theory/scientific_basis.md

  - id: HN8
    statement: "plv_on_held_out refuses to compute PLV on overlapping train/test indices — HeldOutSplit construction raises HeldOutViolation before any statistic is evaluated. In-sample PLV is architecturally impossible through this entry point."
    enforced_in:
      - path: neurophase/metrics/plv.py
        symbol: HeldOutSplit
      - path: neurophase/metrics/plv.py
        symbol: plv_on_held_out
    tests:
      - tests/test_plv_held_out.py::TestHeldOutSplitConstruction::test_overlap_rejected
      - tests/test_plv_held_out.py::TestPLVOnHeldOut::test_held_out_partition_is_disjoint
      - tests/test_plv_held_out.py::TestPLVOnHeldOut::test_locked_signal_is_significant
      - tests/test_plv_held_out.py::TestPLVOnHeldOut::test_noise_is_not_significant
    docs:
      - docs/theory/scientific_basis.md

  - id: HN9
    statement: "Full-pipeline replay is bit-deterministic: same seeds + same inputs produce byte-identical decision trace ledger files across two independent runs of CoupledBrainMarketSystem → TemporalValidator → ExecutionGate(stillness) → DecisionTraceLedger."
    enforced_in:
      - path: neurophase/sync/coupled_brain_market.py
        symbol: CoupledBrainMarketSystem
      - path: neurophase/audit/decision_ledger.py
        symbol: DecisionTraceLedger
    tests:
      - tests/test_determinism_certification.py::TestCoupledSystemDeterminism::test_same_seed_same_trajectory
      - tests/test_determinism_certification.py::TestCoupledSystemDeterminism::test_same_seed_same_noisy_trajectory
      - tests/test_determinism_certification.py::TestLedgerTipDeterminism::test_same_pipeline_same_tip
      - tests/test_determinism_certification.py::TestLedgerTipDeterminism::test_ledger_file_is_byte_identical_on_replay
      - tests/test_determinism_certification.py::TestLedgerReopenCorrectness::test_reopen_continues_chain_identically
      - tests/test_determinism_certification.py::TestEndToEndReplay::test_full_stack_byte_identical_replay
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN10
    statement: "H1 phase-coupling generator has closed-form PLV ground truth at the endpoints: coupling_strength=0 ⇒ ground_truth_plv=0 (independent uniforms); coupling_strength=1 ⇒ ground_truth_plv=1 (pure phase lock). Finite-sample PLV at c=1 is exactly 1.0 for any n."
    enforced_in:
      - path: neurophase/benchmarks/phase_coupling.py
        symbol: generate_phase_coupling
    tests:
      - tests/test_benchmarks_phase_coupling.py::TestGroundTruthEndpoints::test_fully_locked_gives_plv_exactly_one
      - tests/test_benchmarks_phase_coupling.py::TestGroundTruthEndpoints::test_fully_locked_with_offset_still_plv_one
      - tests/test_benchmarks_phase_coupling.py::TestGroundTruthEndpoints::test_independent_pair_has_plv_near_zero
      - tests/test_benchmarks_phase_coupling.py::TestCouplingMonotonicity::test_plv_is_monotone_in_coupling_strength
    docs:
      - docs/theory/scientific_basis.md

  - id: HN11
    statement: "D1 threshold calibration is a pure grid search with out-of-sample validation: the best threshold is selected on the train split only, the test split is held out and its score is reported as the honest OOS number alongside the generalization gap."
    enforced_in:
      - path: neurophase/calibration/threshold.py
        symbol: calibrate_gate_threshold
    tests:
      - tests/test_calibration_threshold.py::TestCalibrationEndToEnd::test_best_threshold_is_near_one_for_clean_separation
      - tests/test_calibration_threshold.py::TestCalibrationEndToEnd::test_report_has_per_threshold_scores_on_both_splits
      - tests/test_calibration_threshold.py::TestCalibrationEndToEnd::test_generalization_gap_is_reported
      - tests/test_calibration_threshold.py::TestCalibrationDeterminism::test_same_grid_same_report
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN12
    statement: "TemporalStreamDetector (B2+B6) classifies the stream as HEALTHY iff fault_rate ≤ max_fault_rate AND at least one sample is VALID; OFFLINE iff no samples are VALID; DEGRADED otherwise. Warmup → non-warmup transitions are never held by hysteresis."
    enforced_in:
      - path: neurophase/data/stream_detector.py
        symbol: TemporalStreamDetector
    tests:
      - tests/test_stream_detector.py::TestClassification::test_all_valid_is_healthy
      - tests/test_stream_detector.py::TestClassification::test_above_fault_rate_is_degraded
      - tests/test_stream_detector.py::TestClassification::test_all_non_valid_is_offline
      - tests/test_stream_detector.py::TestHysteresis::test_hold_prevents_immediate_flip
      - tests/test_stream_detector.py::TestHysteresis::test_warmup_to_steady_is_never_held
    docs:
      - docs/theory/time_integrity.md

  - id: HN13
    statement: "StreamingPipeline composes B1 → B2+B6 → ExecutionGate → optional F1 ledger into one stateful deterministic unit. When a DEGRADED/OFFLINE stream regime is detected, the gate is forced to DEGRADED regardless of the per-sample B1 outcome. Two pipelines with identical config and identical input sequences produce byte-identical ledger files."
    enforced_in:
      - path: neurophase/runtime/pipeline.py
        symbol: StreamingPipeline
    tests:
      - tests/test_runtime_pipeline.py::TestStreamDegradation::test_bad_stream_forces_degraded_gate
      - tests/test_runtime_pipeline.py::TestLedgerIntegration::test_pipeline_ledger_is_byte_identical_across_replays
      - tests/test_runtime_pipeline.py::TestPipelineDeterminism::test_same_input_same_frames
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN14
    statement: "DecisionFrame.to_json_dict() is a flat projection — no nested dataclasses, every field is a primitive, enum name, or None. This is load-bearing for downstream log processors that do not pull in neurophase types."
    enforced_in:
      - path: neurophase/runtime/pipeline.py
        symbol: DecisionFrame
    tests:
      - tests/test_runtime_pipeline.py::TestFrameSerialization::test_to_json_dict_is_serializable
      - tests/test_runtime_pipeline.py::TestFrameSerialization::test_to_json_dict_flat_contract
    docs:
      - docs/EVOLUTION_BOARD.md

  - id: HN15
    statement: "Bibliography is research-grade and honest: every peer-reviewed source has a real DOI, every theoretical claim maps to ≥1 real source via the traceability matrix, and NO docs/ markdown file may re-introduce the fabricated 'Friston/Clark 2026', 'Ming/Wharton 2026', 'NIH 2026', or 'Capital-Weighted Kuramoto WG 2026' citations."
    enforced_in:
      - path: docs/theory/neurophase_elite_bibliography.md
        symbol: elite_bibliography
      - path: docs/validation/evidence_labeling_style_guide.md
        symbol: evidence_taxonomy
    tests:
      - tests/test_bibliography_contract.py::TestEliteBibliography::test_has_enough_real_dois
      - tests/test_bibliography_contract.py::TestEliteBibliography::test_has_traceability_matrix
      - tests/test_bibliography_contract.py::TestEliteBibliography::test_has_all_four_evidence_labels
      - tests/test_bibliography_contract.py::TestCrossReferences::test_anchors_elite_bibliography[docs/theory/scientific_basis.md]
      - tests/test_bibliography_contract.py::TestCrossReferences::test_anchors_elite_bibliography[docs/theory/neurophase_scientific_basis.md]
      - tests/test_bibliography_contract.py::TestCrossReferences::test_anchors_elite_bibliography[docs/science_basis.md]
      - tests/test_bibliography_contract.py::TestCrossReferences::test_anchors_elite_bibliography[README.md]
    docs:
      - docs/theory/neurophase_elite_bibliography.md
      - docs/theory/hierarchical_status_bibliography.md
      - docs/validation/evidence_labeling_style_guide.md

  - id: HN16
    statement: "Cross-module invariant matrix: the live ExecutionGate.evaluate output matches a pure analytical predictor encoding the STATE_MACHINE.yaml priority order (B₁ > I₂ > I₃ > I₁ > I₄) across the full Cartesian product of (time_quality, sensor_present, R, delta, stillness_attached, stillness_result) inputs. Every GateState member is reachable by ≥ 1 matrix cell AND through a natural StreamingPipeline tick sequence. A single disagreement between the live gate and the predictor — including a missing reachability — is a cross-module invariant violation and fails CI."
    enforced_in:
      - path: neurophase/gate/execution_gate.py
        symbol: ExecutionGate.evaluate
      - path: neurophase/runtime/pipeline.py
        symbol: StreamingPipeline.tick
      - path: STATE_MACHINE.yaml
        symbol: gate_state_machine
    tests:
      - tests/test_invariant_matrix.py::TestCrossProduct::test_matrix_is_nontrivial
      - tests/test_invariant_matrix.py::TestCrossProduct::test_every_cell_matches_predictor
      - tests/test_invariant_matrix.py::TestCrossProduct::test_execution_allowed_iff_ready
      - tests/test_invariant_matrix.py::TestReachability::test_every_state_is_reachable
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_temporal_dominates_sensor_absent
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_temporal_dominates_r_invalid
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_temporal_dominates_r_below_threshold
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_sensor_dominates_r_invalid
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_sensor_dominates_r_below_threshold
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_r_invalid_dominates_r_below_threshold
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_r_below_threshold_dominates_stillness
      - tests/test_invariant_matrix.py::TestPriorityOrdering::test_stillness_only_applies_above_threshold
      - tests/test_invariant_matrix.py::TestStateMachineConsistency::test_every_transition_target_is_reachable_by_matrix
      - tests/test_invariant_matrix.py::TestPipelineReachability::test_degraded_reachable_via_bad_R
      - tests/test_invariant_matrix.py::TestPipelineReachability::test_blocked_reachable_via_low_R
      - tests/test_invariant_matrix.py::TestPipelineReachability::test_ready_reachable_via_healthy_high_R
      - tests/test_invariant_matrix.py::TestPipelineReachability::test_unnecessary_reachable_via_still_high_R
      - tests/test_invariant_matrix.py::TestPipelineReachability::test_sensor_absent_reachable_via_direct_gate_call
    docs:
      - docs/theory/invariant_matrix.md
