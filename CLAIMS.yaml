# neurophase — scientific claim registry
#
# Companion to INVARIANTS.yaml. Where INVARIANTS.yaml tracks the
# mechanical contracts of the runtime stack, CLAIMS.yaml tracks the
# scientific claims the system makes about the world.
#
# Every claim has one of three statuses:
#
#   * hypothesis — proposed but not yet supported by published evidence
#   * theory     — supported by ≥ 1 supporting peer-reviewed citation,
#                  with no contradicting citation
#   * fact       — supported by ≥ 3 supporting peer-reviewed citations,
#                  with no contradicting citation
#
# The promotion rule is mechanical and CI-enforced — see HN30 in
# INVARIANTS.yaml. A claim that is marked FACT but only carries one
# supporting citation fails the loader at load time.
#
# DOIs are real and dated. The full bibliography lives in
# docs/theory/neurophase_elite_bibliography.md.

version: 1

claims:
  - id: C1
    statement: >-
      Phase locking value (PLV) measured between two oscillators is a
      well-defined estimator of inter-channel phase synchrony in
      neurophysiology and is computable in O(n) on streaming data.
    status: fact
    evidence:
      - source: "Lachaux et al. 1999"
        doi: "10.1002/(SICI)1097-0193(1999)8:4<194::AID-HBM4>3.0.CO;2-C"
        supports: true
        summary: >-
          Original PLV definition for inter-trial phase locking in
          human MEG/EEG; foundational reference.
      - source: "Bruña, Maestú & Pereda 2018"
        doi: "10.1088/1741-2552/aacfe4"
        supports: true
        summary: >-
          Modern review distinguishing PLV from PLI/wPLI and pinning
          the conditions under which PLV is unbiased on real data.
      - source: "Vinck et al. 2011"
        doi: "10.1016/j.neuroimage.2011.01.055"
        supports: true
        summary: >-
          Comparison of phase synchronization estimators including
          PLV across realistic SNR regimes; confirms PLV's range
          and identifies failure modes.
    related_invariants:
      - HN7
      - HN8
    introduced_in: "C8 PR"
    notes: >-
      The neurophase pipeline only ever computes PLV on held-out
      data via plv_on_held_out — see HN8.

  - id: C2
    statement: >-
      Surrogate-based significance testing of phase synchrony statistics
      is a Type-I-error-controlled alternative to parametric tests when
      the underlying signals violate normality.
    status: theory
    evidence:
      - source: "Theiler et al. 1992"
        doi: "10.1016/0167-2789(92)90102-S"
        supports: true
        summary: >-
          Foundational paper on the surrogate data method for
          nonlinear time-series testing — the IAAFT family.
    related_invariants:
      - HN3
      - HN4
      - HN7
    introduced_in: "C8 PR"
    notes: >-
      Promotion to FACT requires two more independent supporting
      citations. The current evidence is sufficient for THEORY only.

  - id: C3
    statement: >-
      The discrete one-sided p-value estimator p = (1 + k) / (1 + n)
      with +1 smoothing is strictly positive for any finite surrogate
      sample and is the recommended estimator for permutation tests.
    status: fact
    evidence:
      - source: "Phipson & Smyth 2010"
        doi: "10.2202/1544-6115.1585"
        supports: true
        summary: >-
          Original derivation of the +1 smoothing estimator and
          analysis of its bias on small surrogate samples.
      - source: "Ernst 2004"
        doi: "10.1214/088342304000000396"
        supports: true
        summary: >-
          Permutation methods textbook chapter establishing the
          discrete-distribution form of the one-sided p-value used
          in modern resampling tests.
      - source: "Westfall & Young 1993"
        doi: "10.1002/sim.4780122310"
        supports: true
        summary: >-
          Resampling-based multiple-testing methods that motivate
          the smoothed estimator for finite-n surrogate batteries.
    related_invariants:
      - HN3
    introduced_in: "C8 PR"

  - id: C4
    statement: >-
      Predictive coding frames perception as iterative minimisation of
      prediction error against a generative model, and the resulting
      free-energy quantity admits a geometric surrogate proportional
      to the squared circular distance between predicted and observed
      phase.
    status: theory
    evidence:
      - source: "Friston 2010"
        doi: "10.1038/nrn2787"
        supports: true
        summary: >-
          Free-energy principle review; the canonical citation for
          framing perception/action as variational free-energy
          minimisation.
      - source: "Clark 2013"
        doi: "10.1017/S0140525X12000477"
        supports: true
        summary: >-
          Predictive processing review (Behavioral and Brain
          Sciences) framing the cognitive architecture as
          hierarchical Bayesian prediction-error minimisation.
    related_invariants:
      - HN1
    introduced_in: "C8 PR"
    notes: >-
      We do NOT claim that F_proxy = ½·δ² IS the variational free
      energy. HN1 enforces the honest distinction between the full
      free-energy quantity and the geometric surrogate the gate
      actually computes.

  - id: C5
    statement: >-
      Cognitive control under high prediction-error load is mediated by
      anterior-cingulate / prefrontal circuits whose engagement is
      observable as transient changes in EEG theta-band power, and is
      a candidate biomarker for the readiness signal that gates the
      execution-permission decision.
    status: hypothesis
    evidence:
      - source: "Cavanagh & Frank 2014"
        doi: "10.1016/j.tics.2014.04.012"
        supports: true
        summary: >-
          Frontal midline theta as a mechanism of cognitive control
          and its relationship to conflict, error, and adjustment.
      - source: "Internal replication on OpenNeuro ds003458 (Cavanagh 2021) — 2026-04-13"
        doi: ""
        supports: true
        summary: >-
          Cavanagh-style pipeline (FCz, CSD, Morlet θ power 4–8 Hz, 200–500 ms
          post-feedback) vs trial-wise Q-learning RPE, 17 subjects, 1000×
          label-shuffle surrogate. 9 / 17 subjects individually significant
          at α=0.05 (binomial vs chance 0.05: p = 3.29e-8). Confirms a
          trial-level FMθ ↔ RPE relationship exists above chance at the
          group level. DOES NOT confirm direction: among the 9 significant
          subjects, 5 show ρ<0 and 4 show ρ>0, so the sign of the coupling
          is heterogeneous across participants. See
          results/ds003458_csd_20260413.json.
    related_invariants:
      - HN1
    introduced_in: "C8 PR"
    notes: >-
      Status held at HYPOTHESIS despite the internal replication above.
      Rationale: the replication confirms only the existence of a
      trial-wise FMθ ↔ RPE relationship, not its direction. The
      product-critical part of this claim — that FMθ is a usable
      *biomarker for the readiness signal* — requires a direction-
      consistent effect, which is not present in the ds003458 data
      (5 negative / 4 positive ρ among the 9 significant subjects).
      Until that heterogeneity is explained (e.g. by strategy,
      task-phase, or electrode-referencing differences) and replicated
      in a peer-reviewed study with a prespecified direction, this
      claim is NOT suitable as a gating primitive. Promotion to
      THEORY requires (a) an independent peer-reviewed replication
      on a comparable task and (b) a resolved, directional prediction.
      In the evidence-labeling-style-guide vocabulary this sits
      between "Tentative" and "Strongly Plausible": existence-of-
      coupling is Strongly Plausible, direction-of-coupling is
      Tentative.
